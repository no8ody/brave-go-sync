name: docker-publish

on:
  release:
    types:
      - published

permissions:
  contents: read

env:
  IMAGE_NAME: no8odycares/brave-go-sync

jobs:
  publish:
    name: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Prepare build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          release_tag='${{ github.event.release.tag_name }}'
          commit_sha="$(git rev-list -n 1 "$release_tag")"
          build_time="$(date -u +%s)"

          tags="${IMAGE_NAME}:${release_tag}"
          if [[ "$release_tag" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            tags+=$'\n'"${IMAGE_NAME}:latest"
            tags+=$'\n'"${IMAGE_NAME}:stable"
          else
            tags+=$'\n'"${IMAGE_NAME}:dev"
          fi

          {
            printf 'version=%s\n' "$release_tag"
            printf 'commit=%s\n' "$commit_sha"
            printf 'build_time=%s\n' "$build_time"
            printf 'tags<<EOF\n%s\nEOF\n' "$tags"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
