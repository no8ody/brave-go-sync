name: ci

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet -mod=mod ./...

  test:
    name: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Compile non-server packages
        run: |
          packages=$(go list ./... | grep -v '^github.com/brave/go-sync/server$')
          go test -mod=mod -run '^$' $packages

      - name: Compile server test binary without running TestMain
        run: go test -mod=mod -c ./server
